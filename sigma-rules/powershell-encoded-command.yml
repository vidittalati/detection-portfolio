title: Encoded PowerShell Command Execution (Behavioral)
id: sigma-windows-ps-encoded-001
status: experimental
description: Detects PowerShell processes launched with encoded commands or suspicious -EncodedCommand usage and unusual parent processes.
author: Vidit Talati
date: 2025/12/01
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains:
      - "-EncodedCommand"
      - "-e "
  parent_process_check:
    ParentImage|endswith:
      - "\explorer.exe"
      - "\cmd.exe"
  condition: selection and parent_process_check
falsepositives:
  - Enterprise automation using encoded scripts; use allowlist for service accounts and known orchestration tools
level: high
tags:
  - attack.execution
  - attack.t1059.001
